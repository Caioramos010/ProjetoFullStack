<!DOCTYPE html>
<html lang="en">
<head>

    <title>O colecionador</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/colecao.css">
</head>
<body>
    <header class="header__container">
        <a href=""><img src="../imgs/tiopatinhas.png" class="img__header" alt=""></a>
        <nav>
            <a href="usuario.html" class="item__header">Usuário</a>

            <a href="dashboard.html" class="item__header">Dashboard</a>

        </nav>
    </header>
    <section class="detalhes">
        <button class="button-">Mostrar</button>
        <form action="" class="detalhes__container">
            <h2>Colecionavel</h2>
            <input type="text" placeholder="Nome:">
            <input type="text" placeholder="País:">
            <input type="number" placeholder="Ano:">
            <input type="number" placeholder="Valor R$:">
            <textarea name="" id="" placeholder="Detalhes:" rows="5" cols="33"></textarea>
            <input type="file" id="upload">
            <div class="buttons__form">
                <input type="button" value="Gravar">
                <input type="button" value="Limpar">
            </div>
        </form>
    </section>
    <main class="coelacao__container">

        <h2>Coleção</h2>
        <table>
            <thead>
                <tr>
                    <th class="img__table">Imagem</th>
                    <th class="id__table">Id</th>
                    <th class="nome__table">Nome</th>
                    <th class="pais__table">Pais</th>
                    <th class="ano__table">Ano</th>
                    <th class="valor__table">Valor</th>
                    <th class="detalhes__table">Detalhes</th>
                    <th class="acoes__table">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>La</td>
                    <td>01</td>
                    <td>Gabriel</td>
                    <td>Brasil</td>
                    <td>2012</td>
                    <td>1000</td>
                    <td>lalala</td>
                    <td>
                        <button>Editar</button>
                        <button>Excluir</button>
                    </td>
                </tr>
            </tbody>
            <tbody>
                <tr>
                    <td>La</td>

                    <td>Gabriel</td>

                    <td>lalala</td>
                    <td>
                        <button>editar</button>
                        <button>iguinorar</button>
                    </td>
                </tr>
            </tbody>
        </table>
        

    </main>
</body>
</html>
