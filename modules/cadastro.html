<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O colecionador</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
    <main class="cadastro__container">
        <img src="../imgs/tiopatinhas.png" alt="">
        
        <form action="cadastro" class="form__cadastro">
            <div class="form__cadastro__user">
                <h2>Cadastro</h2>
                <input type="text" placeholder="Nome" id="nome-cadastro" minlength="3" required>
                <input type="text" placeholder="E-mail" id="email-cadastro" minlength="3" required>
                <input type="text" placeholder="Login" id="login-cadastro" minlength="3" required>
                <input type="password" placeholder="Senha" id="senha" minlength="3" required>
                <button>Cadastrar</button>
            </div>
            <a href="login.html">Voltar</a>    
        </form>
      
    </main>
    <footer>
        <p>Desenvolvido por Caio e Hyoran</p>
    </footer>
</body>
<script src="../js/cadastro.js"></script>
</html>
